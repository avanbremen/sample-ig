# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: publish-ig

on:
  push:
    tags:
      # Trigger on tags that look like a version.
      # GitHub uses glob patterns here, not regular expressions.
      # The Validate SemVer tag step below performs strict validation.
      - '*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Validate SemVer tag
        # Based on the official SemVer regex:
        # https://semver.org/#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string
        #
        # Bash does not support \d or non-capturing groups (?:...),
        # so this is the Bash-compatible equivalent.
        #
        # Tags with a leading "v", such as v1.0.0, are intentionally not accepted.
        run: |
          SEMVER_REGEX='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'

          if [[ ! "${GITHUB_REF_NAME}" =~ $SEMVER_REGEX ]]; then
            echo "Tag '${GITHUB_REF_NAME}' is not a valid SemVer version."
            echo "Expected examples: 1.0.0, 1.2.3, 1.0.0-alpha.1, 1.0.0+build.1"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Fetch all history and tags.
          # Not strictly required for the current build, but useful for future
          # version-aware features such as changelogs, redirects, or version indexes.
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          # FHIR IG Publisher runs on Java.
          distribution: temurin
          java-version: '25'

      - name: Cache FHIR packages
        uses: actions/cache@v5
        with:
          # FHIR IG Publisher downloads FHIR packages, templates and dependencies
          # into the user-level FHIR package cache. Caching this directory speeds up
          # repeated builds while still allowing the publisher to resolve missing packages.
          path: ~/.fhir/packages
          key: fhir-packages-${{ runner.os }}-${{ hashFiles('ig.ini', 'input/**/*') }}
          restore-keys: |
            fhir-packages-${{ runner.os }}-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          # FHIR IG Publisher uses Jekyll to assemble the generated static site.
          # This step only installs Ruby. Jekyll is installed explicitly in the next step,
          # because the publisher invokes "jekyll" as an external command.
          ruby-version: ruby

      - name: Install Jekyll
        # FHIR IG Publisher invokes "jekyll" as an external command.
        # Installing it as a gem makes the executable available on PATH.
        run: |
          gem install jekyll

      - name: Download FHIR IG Publisher
        # Always download the latest publisher instead of caching publisher.jar.
        # This keeps the workflow simple and avoids using a stale cached jar when
        # the upstream "latest" release changes.
        run: |
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar -o publisher.jar

      - name: Build IG
        # Explicitly set UTF-8 for the Java process. GitHub-hosted Linux runners
        # normally use UTF-8 already, but this makes the build setting intentional
        # and consistent with local Windows builds.
        #
        # The "which" commands are diagnostic and can be removed after the first
        # successful deployment. They show which executables are available on PATH.
        run: |
          which ruby
          which jekyll
          java -Dfile.encoding=UTF-8 -jar publisher.jar -ig ig.ini

      - name: Prepare GitHub Pages content
        # FHIR IG Publisher writes the generated static site to /output/.
        #
        # GitHub Pages should contain:
        #
        #   /                 -> redirects to /latest/
        #   /latest/          -> redirects to the latest version folder
        #   /<version>/       -> contains the actual generated IG snapshot
        #
        # The generated IG is copied into a versioned folder so that every
        # published release remains available at a stable URL.
        #
        # Only redirects are created for / and /latest/. This avoids duplicating
        # the full generated IG under both /latest/ and /<version>/.
        #
        # The .nojekyll marker tells GitHub Pages to serve the generated files
        # as-is, without running its own Jekyll processing step.
        run: |
          mkdir -p "publish/${GITHUB_REF_NAME}"
          cp -R output/. "publish/${GITHUB_REF_NAME}/"

          touch publish/.nojekyll

          mkdir -p publish/latest

          cat > publish/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting</title>
            <noscript>
              <meta http-equiv="refresh" content="1; url=latest/" />
            </noscript>
            <script>
              window.location.replace("latest/" + window.location.hash);
            </script>
          </head>
          <body>
            Redirecting to <a href="latest/">latest/</a>...
          </body>
          </html>
          EOF

          cat > publish/latest/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting</title>
            <noscript>
              <meta http-equiv="refresh" content="1; url=../${GITHUB_REF_NAME}/" />
            </noscript>
            <script>
              window.location.replace("../${GITHUB_REF_NAME}/" + window.location.hash);
            </script>
          </head>
          <body>
            Redirecting to <a href="../${GITHUB_REF_NAME}/">../${GITHUB_REF_NAME}/</a>...
          </body>
          </html>
          EOF

      - name: Generate versions.json
        # Maintain a root-level versions.json file similar to mike for MkDocs.
        #
        # Example:
        #
        # [
        #   {
        #     "version": "0.1.4",
        #     "title": "0.1.4",
        #     "aliases": ["latest"]
        #   },
        #   {
        #     "version": "0.1.3",
        #     "title": "0.1.3",
        #     "aliases": []
        #   }
        # ]
        #
        # The "latest" alias is used by the published documentation site and is
        # independent of GitHub Releases' concept of a "Latest" release:
        #
        #   https://github.com/<owner>/<repo>/releases/latest
        #
        # The documentation site uses:
        #
        #   /latest/
        #
        # to provide a stable URL that always redirects to the most recently
        # published documentation version.
        #
        # Existing versions are read from the current gh-pages branch when
        # available. The current release is inserted at the top and receives
        # the "latest" alias. Older versions keep their metadata but lose
        # the "latest" alias.
        run: |
          # Create a temporary working directory used to retrieve the existing
          # versions.json file from the gh-pages branch.
          #
          # This directory only exists during the workflow run and is never
          # committed to the repository.
          mkdir -p gh-pages-current

          # Check whether the remote gh-pages branch already exists.
          #
          # During the very first release there will be no gh-pages branch yet,
          # so there is no versions.json file to load.
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null; then

            # Fetch the current gh-pages branch into the workflow workspace.
            git fetch origin gh-pages:gh-pages

            # Copy only versions.json from the gh-pages branch into the
            # temporary working directory.
            #
            # The "|| true" allows the workflow to continue when the file
            # does not exist yet.
            git --work-tree=gh-pages-current checkout gh-pages -- versions.json || true
          fi

          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          current_version = os.environ["GITHUB_REF_NAME"]
          versions_file = Path("gh-pages-current/versions.json")
          output_file = Path("publish/versions.json")

          versions = []

          if versions_file.exists():
              versions = json.loads(versions_file.read_text(encoding="utf-8"))

          # Remove the current version if it already exists, for example when
          # re-running a workflow for an existing release.
          versions = [
              {
                  "version": item["version"],
                  "title": item.get("title", item["version"]),
                  "aliases": []
              }
              for item in versions
              if item.get("version") != current_version
          ]

          # Insert the current version at the top of the list and assign the
          # documentation-specific "latest" alias.
          versions.insert(0, {
              "version": current_version,
              "title": current_version,
              "aliases": ["latest"]
          })

          output_file.write_text(
              json.dumps(versions, separators=(",", ": ")),
              encoding="utf-8"
          )
          PY

      - name: Deploy to GitHub Pages branch
        # Publish the prepared /publish/ folder to the gh-pages branch.
        #
        # keep_files: true is important because each release only prepares the
        # current version folder plus the root/latest redirects. Existing version
        # folders on gh-pages must remain available.
        #
        # The cname value writes a CNAME file to the root of gh-pages so GitHub
        # Pages serves the site through the configured custom domain.
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: publish
          keep_files: true
          cname: sample-ig.xtracked.io
          commit_message: Deploy IG version ${{ github.ref_name }}