# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: publish-ig

on:
  push:
    tags:
      # Trigger on tags that look like a version.
      # The Validate SemVer tag step below performs the strict validation.
      - '*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Validate SemVer tag
        # GitHub tag filters use glob patterns, not regular expressions.
        # This step performs strict SemVer validation.
        #
        # Based on the official SemVer regex:
        # https://semver.org/#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string
        #
        # Bash does not support \d or non-capturing groups (?:...),
        # so this is the Bash-compatible equivalent.
        run: |
          SEMVER_REGEX='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          
          if [[ ! "${GITHUB_REF_NAME}" =~ $SEMVER_REGEX ]]; then
            echo "Tag '${GITHUB_REF_NAME}' is not a valid SemVer version."
            echo "Expected examples: 1.0.0, 1.2.3, 1.0.0-alpha.1, 1.0.0+build.1"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        # Fetch all history and tags.
        # Not strictly required for the current build,
        # but useful for future version-aware behavior.
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          # Use Eclipse Temurin 25 Long-Term Supported (LTS) release of JDK.
          distribution: temurin
          java-version: '25'

      - name: Cache FHIR packages
        uses: actions/cache@v5
        with:
          path: ~/.fhir/packages
          key: fhir-packages-${{ runner.os }}-${{ hashFiles('ig.ini', 'input/**/*') }}
          restore-keys: |
            fhir-packages-${{ runner.os }}-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true

      - name: Download FHIR IG Publisher
        run: |
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar -o publisher.jar

      - name: Build IG
        run: |
          java -Dfile.encoding=UTF-8 -jar publisher.jar -ig ig.ini

      - name: Add .nojekyll
        # Prevent GitHub Pages from processing the generated static site with Jekyll.
        run: |
          touch output/.nojekyll

      - name: Deploy version to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: output
          destination_dir: ${{ github.ref_name }}
          keep_files: true
          commit_message: Deploy IG version ${{ github.ref_name }}